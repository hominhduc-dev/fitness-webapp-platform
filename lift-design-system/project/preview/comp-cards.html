<!doctype html>
<!-- @dsCard group="Components" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.surface { background:var(--ink-0); border:1px solid var(--ink-100); border-radius:10px; padding:20px; }
.surface.raised { background:var(--ink-50); }
.surface .meta { font-family:var(--font-mono); font-size:11px; color:var(--ink-400); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; }
.surface .v { font-family:var(--font-mono); font-size:36px; font-weight:500; color:var(--ink-900); font-feature-settings:'tnum' 1; line-height:1; }
.surface .lbl { font-size:13px; color:var(--ink-600); margin-top:6px; }
.delta { display:inline-flex; align-items:center; gap:2px; font-family:var(--font-mono); font-size:12px; color:var(--ok); margin-top:8px; }
</style>
</head>
<body style="background:var(--ink-0);">
<div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px;">
  <div class="surface">
    <div class="meta">This week</div>
    <div class="v">12,480 kg</div>
    <div class="lbl">total volume</div>
    <div class="delta">↑ 8.2% vs last week</div>
  </div>
  <div class="surface">
    <div class="meta">Best bench</div>
    <div class="v">102.5</div>
    <div class="lbl">kg × 5 reps</div>
    <div class="delta">↑ new PR · Mar 14</div>
  </div>
  <div class="surface raised">
    <div class="meta">Workouts</div>
    <div class="v">14</div>
    <div class="lbl">in March</div>
    <div class="delta" style="color:var(--ink-400);">— same as Feb</div>
  </div>
</div>
</body></html>
