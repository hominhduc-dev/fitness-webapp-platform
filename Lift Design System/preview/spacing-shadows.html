<!doctype html>
<!-- @dsCard group="Spacing" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body style="background:#f5f5f1;">
<div style="display:flex; gap:24px;">
  <div style="flex:1; text-align:center;">
    <div style="background:#fcfcfa; border:1px solid #ebebe6; border-radius:10px; height:80px;"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:#4a4a44; margin-top:10px;">--shadow-0 · none<br>default for cards</div>
  </div>
  <div style="flex:1; text-align:center;">
    <div style="background:#fcfcfa; border-radius:10px; height:80px; box-shadow: 0 1px 0 rgba(13,13,11,0.04);"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:#4a4a44; margin-top:10px;">--shadow-1 · 1px<br>scrolled toolbar</div>
  </div>
  <div style="flex:1; text-align:center;">
    <div style="background:#fcfcfa; border-radius:10px; height:80px; box-shadow: 0 4px 16px -4px rgba(13,13,11,0.10), 0 1px 2px rgba(13,13,11,0.04);"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:#4a4a44; margin-top:10px;">--shadow-2<br>dropdown</div>
  </div>
  <div style="flex:1; text-align:center;">
    <div style="background:#fcfcfa; border-radius:10px; height:80px; box-shadow: 0 16px 48px -12px rgba(13,13,11,0.18), 0 2px 6px rgba(13,13,11,0.06);"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:#4a4a44; margin-top:10px;">--shadow-3<br>modal only</div>
  </div>
</div>
</body></html>
