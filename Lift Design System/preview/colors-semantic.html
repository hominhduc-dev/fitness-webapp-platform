<!doctype html>
<!-- @dsCard group="Colors" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:grid; grid-template-columns: repeat(6, 1fr); gap: 6px;">
  <div class="swatch" style="background:#e6f3ec; color:#2a8a5f;"><div class="name">ok-soft</div><div class="hex">#e6f3ec</div></div>
  <div class="swatch" style="background:#2a8a5f; color:#fff;"><div class="name">ok</div><div class="hex">#2a8a5f</div></div>
  <div class="swatch" style="background:#faefdb; color:#b56a1a;"><div class="name">warn-soft</div><div class="hex">#faefdb</div></div>
  <div class="swatch" style="background:#b56a1a; color:#fff;"><div class="name">warn</div><div class="hex">#b56a1a</div></div>
  <div class="swatch" style="background:#faeae6; color:#c0341a;"><div class="name">danger-soft</div><div class="hex">#faeae6</div></div>
  <div class="swatch" style="background:#c0341a; color:#fff;"><div class="name">danger</div><div class="hex">#c0341a</div></div>
</div>
<div style="margin-top:14px; font-size:12px; color:#4a4a44; line-height:1.5;">ok = set completed · warn = unsaved changes · danger = destructive delete. Used sparingly; data is the focus.</div>
</body></html>
