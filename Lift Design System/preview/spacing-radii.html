<!doctype html>
<!-- @dsCard group="Spacing" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:flex; gap:20px; align-items:flex-end;">
  <div style="text-align:center;"><div style="width:60px; height:60px; background:#ebebe6; border-radius:0;"></div><div style="font-family:var(--font-mono); font-size:11px; color:#4a4a44; margin-top:8px;">--r-0<br>0</div></div>
  <div style="text-align:center;"><div style="width:60px; height:60px; background:#ebebe6; border-radius:2px;"></div><div style="font-family:var(--font-mono); font-size:11px; color:#4a4a44; margin-top:8px;">--r-1<br>2px</div></div>
  <div style="text-align:center;"><div style="width:60px; height:60px; background:#ebebe6; border-radius:4px;"></div><div style="font-family:var(--font-mono); font-size:11px; color:#4a4a44; margin-top:8px;">--r-2<br>4 · inputs</div></div>
  <div style="text-align:center;"><div style="width:60px; height:60px; background:#ebebe6; border-radius:6px;"></div><div style="font-family:var(--font-mono); font-size:11px; color:#4a4a44; margin-top:8px;">--r-3<br>6 · buttons</div></div>
  <div style="text-align:center;"><div style="width:60px; height:60px; background:#ebebe6; border-radius:10px;"></div><div style="font-family:var(--font-mono); font-size:11px; color:#4a4a44; margin-top:8px;">--r-4<br>10 · cards</div></div>
  <div style="text-align:center;"><div style="width:60px; height:60px; background:#ebebe6; border-radius:14px;"></div><div style="font-family:var(--font-mono); font-size:11px; color:#4a4a44; margin-top:8px;">--r-5<br>14</div></div>
  <div style="text-align:center;"><div style="width:80px; height:32px; background:#ebebe6; border-radius:999px;"></div><div style="font-family:var(--font-mono); font-size:11px; color:#4a4a44; margin-top:8px;">--r-pill<br>chips only</div></div>
</div>
