<!doctype html>
<!-- @dsCard group="Components" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="background:rgba(252,252,250,0.8); backdrop-filter: blur(8px); border:1px solid var(--ink-100); border-radius:10px; padding:16px 20px; display:flex; align-items:center; gap:20px; box-shadow: 0 4px 16px -4px rgba(13,13,11,0.10);">
  <div>
    <div class="label" style="margin-bottom:4px;">Rest</div>
    <div style="font-family:var(--font-mono); font-size:36px; font-weight:600; line-height:1; color:var(--accent); font-feature-settings:'tnum' 1;">1:24</div>
  </div>
  <div style="flex:1;">
    <div style="height:4px; background:var(--ink-100); border-radius:999px; overflow:hidden;">
      <div style="height:100%; width:55%; background:var(--accent);"></div>
    </div>
    <div style="font-size:12px; color:var(--ink-600); margin-top:8px;">After: Bench press, set 3 · 82.5 kg × 8</div>
  </div>
  <button style="font-family:var(--font-sans); font-size:13px; padding:6px 12px; background:transparent; border:1px solid var(--ink-150); border-radius:6px; color:var(--ink-800); cursor:pointer;">+30 s</button>
  <button style="font-family:var(--font-sans); font-size:13px; padding:6px 12px; background:transparent; border:none; color:var(--danger); cursor:pointer;">Skip</button>
</div>
</body></html>
