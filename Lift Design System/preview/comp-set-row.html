<!doctype html>
<!-- @dsCard group="Components" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.set-row { display:grid; grid-template-columns: 56px 70px 1fr 1fr 1fr 32px; gap:12px; align-items:center; padding:10px 12px; border-bottom:1px solid var(--ink-100); font-family:var(--font-mono); font-size:14px; }
.set-row.complete { background:var(--ink-50); color:var(--ink-400); }
.set-row.active { background:#fcfcfa; }
.set-row.active .num { color:var(--accent); }
.num { font-weight:600; color:var(--ink-800); font-size:15px; }
.warmup { font-size:10px; color:var(--ink-400); letter-spacing:0.08em; text-transform:uppercase; }
.val { color:var(--ink-800); font-feature-settings:'tnum' 1; }
.complete .val { color:var(--ink-400); text-decoration:line-through; text-decoration-color:var(--ink-200); }
.check { width:22px; height:22px; border-radius:4px; border:1.5px solid var(--ink-200); display:flex; align-items:center; justify-content:center; cursor:pointer; }
.check.done { background:var(--ok); border-color:var(--ok); color:#fff; font-size:13px; }
.cell-lbl { font-family:var(--font-mono); font-size:10px; color:var(--ink-400); text-transform:uppercase; letter-spacing:0.08em; padding:0 12px 6px; display:grid; grid-template-columns: 56px 70px 1fr 1fr 1fr 32px; gap:12px; border-bottom:1px solid var(--ink-100); }
</style>
</head>
<body>
<div class="cell-lbl">
  <span>Set</span><span>Type</span><span>Previous</span><span>kg</span><span>Reps</span><span></span>
</div>
<div class="set-row complete"><span class="num">1</span><span class="warmup">warm</span><span class="val">— · —</span><span class="val">60.0</span><span class="val">10</span><span class="check done">✓</span></div>
<div class="set-row complete"><span class="num">2</span><span class="warmup">work</span><span class="val">80.0 × 8</span><span class="val">80.0</span><span class="val">8</span><span class="check done">✓</span></div>
<div class="set-row active"><span class="num">3</span><span class="warmup" style="color:var(--accent);">work</span><span class="val">82.5 × 8</span><span class="val">82.5</span><span class="val">8</span><span class="check"></span></div>
<div class="set-row"><span class="num">4</span><span class="warmup">work</span><span class="val">85.0 × 6</span><span class="val">85.0</span><span class="val">—</span><span class="check"></span></div>
</body></html>
