<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 6px;">
  <div class="swatch" style="background:#eaeeff; color:#0a1a8a;"><div class="name">accent-soft</div><div class="hex">#eaeeff</div></div>
  <div class="swatch" style="background:#3a5fff; color:#fff; min-height:140px;"><div class="name">accent</div><div class="hex">#3a5fff</div></div>
  <div class="swatch" style="background:#2a4ff0; color:#fff;"><div class="name">accent-hover</div><div class="hex">#2a4ff0</div></div>
  <div class="swatch" style="background:#1f3fd9; color:#fff;"><div class="name">accent-press</div><div class="hex">#1f3fd9</div></div>
  <div class="swatch" style="background:#0a1a8a; color:#fff;"><div class="name">accent-ink</div><div class="hex">#0a1a8a</div></div>
</div>
<div style="margin-top:14px; font-size:12px; color:#4a4a44; line-height:1.5;">Reserved for: active set indicator · primary CTA · focus ring · today's date · current bar in charts.</div>
