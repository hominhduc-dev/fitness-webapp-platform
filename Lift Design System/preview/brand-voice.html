<!doctype html>
<!-- @dsCard group="Brand" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
  <div style="padding:16px 18px; border:1px solid var(--ok); background:var(--ok-soft); border-radius:8px;">
    <div class="label" style="color:var(--ok); margin-bottom:8px;">✓ Lift voice</div>
    <div style="font-size:14px; line-height:1.55; color:var(--ink-800);">"Today — Push day."<br>"New best on bench press. 102.5 kg × 5."<br>"Rest. 1:30 left."<br>"No workouts yet. Start one."</div>
  </div>
  <div style="padding:16px 18px; border:1px solid var(--danger); background:var(--danger-soft); border-radius:8px;">
    <div class="label" style="color:var(--danger); margin-bottom:8px;">✗ Off-brand</div>
    <div style="font-size:14px; line-height:1.55; color:var(--ink-800);">"Good morning, John! 💪"<br>"🎉 NEW PR!! You CRUSHED it!"<br>"Take a breather, champion!"<br>"Welcome! Let's begin your fitness journey 🚀"</div>
  </div>
</div>
</body></html>
