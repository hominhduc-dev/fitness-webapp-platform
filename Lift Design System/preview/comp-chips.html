<!doctype html>
<!-- @dsCard group="Components" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.chip { display:inline-flex; align-items:center; gap:6px; font-family:var(--font-sans); font-size:13px; font-weight:500; padding:5px 12px; border-radius:999px; border:1px solid var(--ink-150); background:#fcfcfa; color:var(--ink-800); }
.chip.active { background:var(--ink-800); color:var(--ink-0); border-color:var(--ink-800); }
.tag { display:inline-flex; align-items:center; padding:3px 7px; border-radius:4px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-weight:500; }
.tag-pr { background:var(--accent-soft); color:var(--accent-ink); }
.tag-ok { background:var(--ok-soft); color:var(--ok); }
.tag-warn { background:var(--warn-soft); color:var(--warn); }
.tag-neutral { background:var(--ink-100); color:var(--ink-600); }
</style>
</head>
<body>
<div class="label" style="margin-bottom:10px;">Filter chips · pill, sentence case</div>
<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;">
  <span class="chip active">All</span>
  <span class="chip">Push</span>
  <span class="chip">Pull</span>
  <span class="chip">Legs</span>
  <span class="chip">Cardio</span>
</div>
<div class="label" style="margin-bottom:10px;">Status tags · mono, UPPERCASE, 11px</div>
<div style="display:flex; gap:8px; flex-wrap:wrap;">
  <span class="tag tag-pr">PR</span>
  <span class="tag tag-ok">COMPLETE</span>
  <span class="tag tag-warn">DRAFT</span>
  <span class="tag tag-neutral">WARM-UP</span>
  <span class="tag tag-neutral">SET 3</span>
</div>
</body></html>
