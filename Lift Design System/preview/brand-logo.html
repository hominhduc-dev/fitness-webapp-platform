<!doctype html>
<!-- @dsCard group="Brand" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:0; border:1px solid var(--ink-100); border-radius:10px; overflow:hidden;">
  <div style="padding:30px; background:var(--ink-0); display:flex; align-items:center; justify-content:center; gap:20px;">
    <div style="color:var(--ink-900); width:64px; height:64px;"><img src="../assets/lift-mark.svg" style="width:100%; height:100%;" /></div>
    <div style="color:var(--ink-900); width:160px;"><img src="../assets/lift-wordmark.svg" style="width:100%; height:auto;" /></div>
  </div>
  <div style="padding:30px; background:var(--ink-900); display:flex; align-items:center; justify-content:center; gap:20px;">
    <div style="color:var(--ink-0); width:64px; height:64px;"><img src="../assets/lift-mark.svg" style="width:100%; height:100%; filter:invert(1);" /></div>
    <div style="color:var(--ink-0); width:160px;"><img src="../assets/lift-wordmark.svg" style="width:100%; height:auto; filter:invert(1);" /></div>
  </div>
</div>
<div style="margin-top:14px; font-size:12px; color:var(--ink-600);">Monochrome only. Never tinted with the accent. Mark works as favicon at 16px.</div>
</body></html>
